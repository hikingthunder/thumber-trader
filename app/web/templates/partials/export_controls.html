<div class="card" style="grid-column: span 2;">
    <h2>Export Data</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
        <!-- Standard Exports -->
        <div class="export-group">
            <h3>Fills / Trades</h3>
            <div class="btn-group">
                <a href="/export/fills/csv" class="btn btn-secondary">CSV</a>
                <a href="/export/fills/xlsx" class="btn btn-secondary">XLSX</a>
                <a href="/export/fills/ods" class="btn btn-secondary">ODS</a>
            </div>
        </div>

        <div class="export-group">
            <h3>Tax matches</h3>
            <div class="btn-group">
                <a href="/export/tax_matches/csv" class="btn btn-secondary">CSV</a>
                <a href="/export/tax_matches/xlsx" class="btn btn-secondary">XLSX</a>
                <a href="/export/tax_matches/ods" class="btn btn-secondary">ODS</a>
            </div>
        </div>

        <div class="export-group">
            <h3>Daily Stats</h3>
            <div class="btn-group">
                <a href="/export/stats/csv" class="btn btn-secondary">CSV</a>
                <a href="/export/stats/xlsx" class="btn btn-secondary">XLSX</a>
                <a href="/export/stats/ods" class="btn btn-secondary">ODS</a>
            </div>
        </div>

        <!-- Accounting Exports -->
        <div class="export-group">
            <h3>Accounting (QB/Quicken)</h3>
            <div class="btn-group">
                <a href="/export/accounting_fills/csv" class="btn btn-primary">Fills CSV</a>
                <a href="/export/accounting_tax/csv" class="btn btn-primary">Tax Lots CSV</a>
            </div>
        </div>

        <!-- Financial Software -->
        <div class="export-group">
            <h3>📥 Quicken (QFX)</h3>
            <div class="btn-group">
                <a href="/export/fills/qfx" class="btn btn-accent">Fills .QFX</a>
                <a href="/export/tax_matches/qfx" class="btn btn-accent">Tax .QFX</a>
            </div>
        </div>

        <div class="export-group">
            <h3>📥 QuickBooks (QBO)</h3>
            <div class="btn-group">
                <a href="/export/fills/qbo" class="btn btn-accent">Fills .QBO</a>
                <a href="/export/tax_matches/qbo" class="btn btn-accent">Tax .QBO</a>
            </div>
        </div>

        <div class="export-group">
            <h3>📥 TurboTax (8949)</h3>
            <div class="btn-group">
                <a href="/export/tax_matches/turbotax" class="btn btn-accent">Form 8949 CSV</a>
            </div>
        </div>
    </div>
</div>

</div>
