<div class="card">
    <h2>Export Dataset Bundle</h2>
    <p style="color: var(--text-muted); margin-top: -4px;">
        Generate a complete export package containing fills, tax lot matches, daily performance, and fee summaries.
    </p>

    <form method="post" action="/export/generate" style="display: grid; gap: 16px; margin-top: 16px;">
        <input type="hidden" name="csrf_token" value="{{ request.cookies.get('thumber_csrf_token') }}">

        <div class="export-grid">
            <div class="form-group">
                <label for="format">File Format</label>
                <select id="format" name="format" required>
                    {% for fmt in formats %}
                    <option value="{{ fmt }}">{{ fmt.upper() }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="tax_method">Tax Lot Method</label>
                <select id="tax_method" name="tax_method" required>
                    {% for method in tax_methods %}
                    <option value="{{ method }}">{{ method }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-success">⬇ Generate Export</button>
        </div>
    </form>
</div>

<style>
    .export-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-weight: 700;
    }

    .form-group select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
        background: #020617;
        color: var(--text-color);
    }
</style>
